{% extends 'base.html' %}
{% block title %}Delete Job{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle-fill text-danger display-3 mb-3"></i>
        <h4>Delete Job Posting?</h4>
        <p class="text-muted">Are you sure you want to delete <strong>{{ job.title }}</strong>? This action cannot be undone.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2"><i class="bi bi-trash"></i> Yes, Delete</button>
        </form>
        <a href="{% url 'job_detail' job.pk %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
