version: "3.9"

services:
  redis:
    image: redis:7-alpine
    network_mode: host

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - .:/app
      - ./media:/app/media
    network_mode: host
    env_file: .env

  celery:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    network_mode: host
    env_file: .env
