{% extends 'base.html' %}
{% block title %}Update Status{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h4 class="mb-1">Update Application Status</h4>
        <p class="text-muted mb-4">{{ application.applicant.username }} → {{ application.job.title }}</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Status</label>
            {{ form.status }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'job_applications' application.job.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>$('form select').addClass('form-select');</script>
{% endblock %}
